name: Release

on:
  push:
    tags:
      - 'infs-v*.*.*'
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0 or infs-v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  get-tag:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release tag
        id: get-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_TAG="${{ inputs.tag }}"
            # Validate: must be a non-empty single-line string matching a semver tag (vX.Y.Z* or infs-vX.Y.Z*)
            if [[ ! "$INPUT_TAG" =~ ^(infs-)?v[0-9]+\.[0-9]+\.[0-9]+ ]] || [[ "$INPUT_TAG" =~ [[:space:]] ]]; then
              echo "::error::Invalid tag input: '$INPUT_TAG'. Expected format: v<major>.<minor>.<patch>[...] or infs-v<major>.<minor>.<patch>[...]"
              exit 1
            fi
            printf 'tag=%s\n' "$INPUT_TAG" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"
          else
            git fetch --tags origin
            TAG=$(git describe --tags --exact-match "${{ github.event.workflow_run.head_sha }}" 2>/dev/null || true)
            if [ -z "$TAG" ]; then
              echo "::error::No tag found pointing at ${{ github.event.workflow_run.head_sha }}"
              exit 1
            fi
            printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"
          fi

  build-release:
    needs: get-tag
    if: ${{ needs.get-tag.outputs.tag != '' }}
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: infs
            asset_name: infs-linux-x86_64
            use_cross: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: infs
            asset_name: infs-linux-aarch64
            use_cross: true

          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: infs
            asset_name: infs-macos-x86_64
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: infs
            asset_name: infs-macos-aarch64
            use_cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: infs.exe
            asset_name: infs-windows-x86_64.exe
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.get-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use_cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build with cross
        if: ${{ matrix.use_cross }}
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Upload release asset
        run: gh release upload "${{ needs.get-tag.outputs.tag }}" "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}#${{ matrix.asset_name }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
