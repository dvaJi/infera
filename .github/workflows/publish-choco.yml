name: Publish Chocolatey Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g., v1.0.0 or infs-v1.0.0)"
        required: true
      source:
        description: "Chocolatey push source"
        required: false
        default: https://push.chocolatey.org/

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Resolve package version
        shell: pwsh
        run: |
          $tag = '${{ inputs.tag }}'
          if ($tag -notmatch '^(infs-)?v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z-.]+)?$') {
            throw "Invalid tag input: '$tag'. Expected v<major>.<minor>.<patch> or infs-v<major>.<minor>.<patch>."
          }

          $version = $tag -replace '^infs-', '' -replace '^v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Stage Chocolatey package
        shell: pwsh
        run: |
          $packageRoot = Join-Path $env:RUNNER_TEMP 'infs-chocolatey'
          $toolsDir = Join-Path $packageRoot 'tools'

          New-Item -ItemType Directory -Force -Path $toolsDir | Out-Null
          Copy-Item 'packaging/chocolatey/infs.nuspec' $packageRoot
          Copy-Item 'packaging/chocolatey/tools/*' $toolsDir -Force
          Copy-Item 'target/x86_64-pc-windows-msvc/release/infs.exe' (Join-Path $toolsDir 'infs.exe') -Force

          "PACKAGE_ROOT=$packageRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Pack Chocolatey package
        shell: pwsh
        run: |
          choco pack (Join-Path $env:PACKAGE_ROOT 'infs.nuspec') --version $env:VERSION --output-directory $env:PACKAGE_ROOT

      - name: Push Chocolatey package
        shell: pwsh
        run: |
          $packagePath = Join-Path $env:PACKAGE_ROOT "infs.$env:VERSION.nupkg"
          choco push $packagePath --source '${{ inputs.source }}' --api-key $env:CHOCO_API_KEY
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
